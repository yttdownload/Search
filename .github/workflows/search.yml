name: "🔍 جستجوی پیشرفته یوتیوب"

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: "عبارت جستجو"
        required: true
        type: string
      max_results:
        description: "تعداد نتایج (حداکثر ۳۰۰)"
        required: false
        default: "50"
        type: string
      video_type:
        description: "نوع ویدیو"
        required: false
        default: "any"
        type: choice
        options:
          - any
          - short
          - long
      sort_by:
        description: "مرتب‌سازی"
        required: false
        default: "relevance"
        type: choice
        options:
          - relevance
          - date
          - views
      include_description:
        description: "تعداد کاراکتر توضیحات (۰=ندارد)"
        required: false
        default: "0"
        type: string
      output_format:
        description: "فرمت خروجی (علاوه بر README)"
        required: false
        default: "markdown"
        type: choice
        options:
          - markdown
          - json
          - csv

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: بررسی مخزن
        uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install --upgrade yt-dlp

      - name: اجرای جستجو با پایتون
        id: search
        run: |
          python3 << 'EOF'
          import json
          import subprocess
          import sys
          import os
          from datetime import datetime

          # دریافت ورودی‌ها از environment variables
          query = os.environ.get('INPUT_SEARCH_QUERY', '')
          max_results = int(os.environ.get('INPUT_MAX_RESULTS', '50'))
          video_type = os.environ.get('INPUT_VIDEO_TYPE', 'any')
          sort_by = os.environ.get('INPUT_SORT_BY', 'relevance')
          desc_limit = int(os.environ.get('INPUT_INCLUDE_DESCRIPTION', '0'))
          output_format = os.environ.get('INPUT_OUTPUT_FORMAT', 'markdown')

          if max_results > 300:
              max_results = 300

          # ساخت آرگومان‌های yt-dlp
          yt_args = [
              'yt-dlp', '--flat-playlist', '--dump-json',
              '--playlist-end', str(max_results),
              f'ytsearch{max_results}:{query}'
          ]

          # فیلتر مدت زمان
          if video_type == 'short':
              yt_args.extend(['--match-filter', 'duration < 300'])
          elif video_type == 'long':
              yt_args.extend(['--match-filter', 'duration > 600'])

          # مرتب‌سازی (در حد ممکن، yt-dlp مستقیماً پشتیبانی نمی‌کند، ولی بعداً در پایتون انجام می‌شود)
          # فعلاً فقط داده را می‌گیریم، بعداً sort می‌کنیم.

          print(f"🔄 در حال جستجوی '{query}' (حداکثر {max_results} نتیجه)...")
          result = subprocess.run(yt_args, capture_output=True, text=True)
          if result.returncode != 0:
              print("❌ خطا در اجرای yt-dlp")
              print(result.stderr)
              sys.exit(1)

          # هر خط یک JSON شیء است
          videos = []
          for line in result.stdout.strip().split('\n'):
              if not line:
                  continue
              try:
                  video = json.loads(line)
                  videos.append(video)
              except:
                  pass

          count = len(videos)
          print(f"✅ تعداد نتایج: {count}")

          if count == 0:
              print("❌ هیچ ویدیویی یافت نشد.")
              sys.exit(0)

          # مرتب‌سازی بر اساس ورودی (فقط date و views)
          if sort_by == 'date':
              videos.sort(key=lambda x: x.get('upload_date', ''), reverse=True)
          elif sort_by == 'views':
              videos.sort(key=lambda x: x.get('view_count', 0), reverse=True)
          # relevance ترتیب پیش‌فرض yt-dlp را حفظ می‌کند

          # ذخیره خروجی json یا csv در صورت نیاز
          os.makedirs('youtube-search', exist_ok=True)

          if output_format == 'json':
              with open('youtube-search/results.json', 'w', encoding='utf-8') as f:
                  json.dump(videos, f, indent=2, ensure_ascii=False)
          elif output_format == 'csv':
              import csv
              with open('youtube-search/results.csv', 'w', newline='', encoding='utf-8') as f:
                  writer = csv.writer(f)
                  writer.writerow(['title', 'url', 'duration', 'views', 'uploader', 'upload_date', 'description', 'thumbnail'])
                  for v in videos:
                      writer.writerow([
                          v.get('title', ''),
                          f"https://youtube.com/watch?v={v.get('id', '')}",
                          v.get('duration', 0),
                          v.get('view_count', 0),
                          v.get('uploader', ''),
                          v.get('upload_date', ''),
                          v.get('description', '')[:desc_limit] if desc_limit else '',
                          v.get('thumbnail', '')
                      ])

          # ساخت README.md با جدول مارک‌داون
          md_lines = []
          md_lines.append(f"# 📺 نتایج جستجو: {query}\n")
          md_lines.append(f"**تعداد نتایج:** {count}")
          md_lines.append(f"**نوع ویدیو:** {video_type}")
          md_lines.append(f"**تاریخ جستجو:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n")
          md_lines.append("| # | بندانگشتی | عنوان و توضیحات | کانال | مدت | بازدید | تاریخ |")
          md_lines.append("|---|-----------|----------------|-------|-----|--------|-------|")

          for idx, v in enumerate(videos, 1):
              vid = v.get('id', '')
              title = v.get('title', '').replace('|', ' ')
              uploader = v.get('uploader', '?')
              duration = v.get('duration', 0)
              views = v.get('view_count', 0)
              upload_date = v.get('upload_date', '')
              thumbnail = v.get('thumbnail', '')
              description = v.get('description', '')

              # مدت زمان
              if duration and duration > 0:
                  mins = duration // 60
                  secs = duration % 60
                  duration_str = f"{mins}:{secs:02d}"
              else:
                  duration_str = "?"

              # بازدید
              if views:
                  if views >= 1_000_000:
                      views_str = f"{views // 1_000_000}M"
                  elif views >= 1_000:
                      views_str = f"{views // 1_000}K"
                  else:
                      views_str = str(views)
              else:
                  views_str = "?"

              # تاریخ
              if upload_date and len(upload_date) == 8:
                  date_str = f"{upload_date[:4]}/{upload_date[4:6]}/{upload_date[6:8]}"
              else:
                  date_str = "?"

              # توضیحات کوتاه
              if desc_limit > 0 and description:
                  desc_short = description[:desc_limit]
                  if len(description) > desc_limit:
                      desc_short += "..."
              else:
                  desc_short = ""

              title_clean = title.replace('|', ' ')
              md_lines.append(
                  f"| {idx} | <img src=\"{thumbnail}\" width=\"80\"> | **{title_clean}**<br><small>{desc_short}</small> | {uploader} | {duration_str} | {views_str} | {date_str} |"
              )

          with open('youtube-search/README.md', 'w', encoding='utf-8') as f:
              f.write("\n".join(md_lines))

          print("✅ README ساخته شد.")
          with open('count.txt', 'w') as f:
              f.write(str(count))
          EOF
        env:
          INPUT_SEARCH_QUERY: ${{ github.event.inputs.search_query }}
          INPUT_MAX_RESULTS: ${{ github.event.inputs.max_results }}
          INPUT_VIDEO_TYPE: ${{ github.event.inputs.video_type }}
          INPUT_SORT_BY: ${{ github.event.inputs.sort_by }}
          INPUT_INCLUDE_DESCRIPTION: ${{ github.event.inputs.include_description }}
          INPUT_OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}

      - name: Commit نتایج به مخزن
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add youtube-search/
          git diff --cached --quiet || git commit -m "Add YouTube search results for '${{ github.event.inputs.search_query }}' [skip ci]"
          git push

      - name: ذخیره به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-search-results
          path: youtube-search/
          retention-days: 7

      - name: نمایش خلاصه در GitHub Summary
        run: |
          echo "# 🔍 نتایج جستجو: ${{ github.event.inputs.search_query }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat youtube-search/README.md >> $GITHUB_STEP_SUMMARY
