name: "02 - 🔍 جستجوی پیشرفته یوتیوب"

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: "📝 عبارت جستجو"
        required: true
        type: string
      max_results:
        description: "🔢 تعداد نتایج (۱ تا ۳۰۰)"
        required: false
        default: "50"
        type: string
      video_type:
        description: "🎬 نوع ویدیو"
        required: false
        default: "any"
        type: choice
        options:
          - any
          - short
          - long
      sort_by:
        description: "📊 مرتب‌سازی بر اساس"
        required: false
        default: "relevance"
        type: choice
        options:
          - relevance
          - date
          - views
      include_description:
        description: "📄 تعداد کاراکتر توضیحات (۰ = حذف)"
        required: false
        default: "0"
        type: string
      output_format:
        description: "📄 فرمت خروجی (مارک‌داون همیشه در README ذخیره می‌شود)"
        required: false
        default: "markdown"
        type: choice
        options:
          - markdown
          - json
          - csv

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: بررسی مخزن
        uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip jq
          pip3 install --upgrade yt-dlp

      - name: اجرای جستجو و ساخت README
        id: search
        run: |
          QUERY="${{ github.event.inputs.search_query }}"
          MAX="${{ github.event.inputs.max_results }}"
          VID_TYPE="${{ github.event.inputs.video_type }}"
          DESC_LIMIT="${{ github.event.inputs.include_description }}"
          OUTPUT="${{ github.event.inputs.output_format }}"

          if [ "$MAX" -gt 300 ]; then MAX=300; fi
          if [ -z "$DESC_LIMIT" ]; then DESC_LIMIT=0; fi

          FILTER_ARGS=""
          if [ "$VID_TYPE" = "short" ]; then
            FILTER_ARGS="--match-filter 'duration < 300'"
          elif [ "$VID_TYPE" = "long" ]; then
            FILTER_ARGS="--match-filter 'duration > 600'"
          fi

          echo "🔍 در حال جستجوی '$QUERY' (حداکثر $MAX نتیجه) ..."

          yt-dlp --flat-playlist --dump-json \
            --playlist-end "$MAX" \
            $FILTER_ARGS \
            "ytsearch${MAX}:${QUERY}" > raw.json.tmp

          jq -s '.' raw.json.tmp > raw.json
          rm raw.json.tmp

          COUNT=$(jq 'length' raw.json)
          echo "TOTAL_COUNT=$COUNT" >> $GITHUB_ENV

          if [ "$COUNT" -eq 0 ]; then
            echo "❌ هیچ ویدیویی یافت نشد."
            exit 0
          fi

          mkdir -p youtube-search

          if [ "$OUTPUT" = "json" ]; then
            cp raw.json youtube-search/results.json
          elif [ "$OUTPUT" = "csv" ]; then
            echo "title,url,duration,views,uploader,upload_date,description,thumbnail" > youtube-search/results.csv
            jq -r --arg desc "$DESC_LIMIT" '.[] | [
              .title,
              ("https://youtube.com/watch?v=" + .id),
              (.duration // 0),
              (.view_count // 0),
              .uploader,
              .upload_date,
              (.description // "" | .[0:($desc | tonumber)]),
              .thumbnail
            ] | @csv' raw.json >> youtube-search/results.csv
          fi

          # ساخت README با استفاده از jq -r (بدون حلقه bash)
          cat > youtube-search/README.md << 'EOF'
# 📺 نتایج جستجو: QUERY_PLACEHOLDER

**تعداد نتایج:** COUNT_PLACEHOLDER  
**نوع ویدیو:** TYPE_PLACEHOLDER  
**تاریخ جستجو:** DATE_PLACEHOLDER

| # | بندانگشتی | عنوان و توضیحات | کانال | مدت | بازدید | تاریخ |
|---|-----------|----------------|-------|-----|--------|-------|
EOF

          # جایگزینی مقادیر در README
          CURRENT_DATE=$(date '+%Y-%m-%d %H:%M:%S')
          sed -i "s|QUERY_PLACEHOLDER|$QUERY|g" youtube-search/README.md
          sed -i "s|COUNT_PLACEHOLDER|$COUNT|g" youtube-search/README.md
          sed -i "s|TYPE_PLACEHOLDER|$VID_TYPE|g" youtube-search/README.md
          sed -i "s|DATE_PLACEHOLDER|$CURRENT_DATE|g" youtube-search/README.md

          # تولید ردیف‌های جدول با jq
          jq -r --arg desc "$DESC_LIMIT" '
            .[] | 
            .duration_str = (if .duration then ((.duration/60)|floor|tostring) + ":" + ((.duration%60)|tostring| ("0" + .)[-2:]) else "?" end) |
            .views_str = (if .view_count then
              (if .view_count >= 1000000 then ((.view_count/1000000)|floor|tostring) + "M"
               elif .view_count >= 1000 then ((.view_count/1000)|floor|tostring) + "K"
               else .view_count|tostring end)
              else "?" end) |
            .date_str = (if .upload_date and (.upload_date|length)==8 then
              .upload_date[0:4] + "/" + .upload_date[4:6] + "/" + .upload_date[6:8]
              else "?" end) |
            .desc_short = (if .description and ($desc|tonumber) > 0 then
              .description[0:($desc|tonumber)] + (if (.description|length) > ($desc|tonumber) then "..." else "" end)
              else "" end) |
            .title_clean = (.title | gsub("\\|"; " ")) |
            "| __NUM__ | <img src=\"" + .thumbnail + "\" width=\"80\"> | **" + .title_clean + "**<br><small>" + .desc_short + "</small> | " + .uploader + " | " + .duration_str + " | " + .views_str + " | " + .date_str + " |"
          ' raw.json >> youtube-search/README.md

          # شماره‌گذاری ردیف‌ها
          if [ -f youtube-search/README.md ]; then
            lineno=1
            temp_file=$(mktemp)
            while IFS= read -r line; do
              if [[ "$line" == *"__NUM__"* ]]; then
                echo "${line/__NUM__/$lineno}" >> "$temp_file"
                lineno=$((lineno + 1))
              else
                echo "$line" >> "$temp_file"
              fi
            done < youtube-search/README.md
            mv "$temp_file" youtube-search/README.md
          fi

          echo "RESULT_FILE=youtube-search/README.md" >> $GITHUB_ENV
          echo "✅ README ساخته شد."

      - name: Commit نتایج به مخزن
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add youtube-search/
          git diff --cached --quiet || git commit -m "Add YouTube search results for '${{ github.event.inputs.search_query }}' [skip ci]"
          git push

      - name: ذخیره به عنوان Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-search-results
          path: youtube-search/
          retention-days: 7

      - name: نمایش خلاصه در GitHub Summary
        run: |
          echo "# 🔍 نتایج جستجو: ${{ github.event.inputs.search_query }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat youtube-search/README.md >> $GITHUB_STEP_SUMMARY
